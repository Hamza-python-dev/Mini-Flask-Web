{% extends 'base.html' %}

{% block content %}

<div style="margin-top: 100px; padding-top: 30px;"></div>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container mt-3">
      {% for category, message in messages %}
        <div class="alert alert-{{category}}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<section class="contact-us section">
  <div class="container">
    <div class="row">

      <div class="col-lg-6 offset-lg-3">
        <div class="section-heading">
          <h4>Contact Us</h4>
          <h2>Send us a message</h2>
        </div>
      </div>

      <div class="col-lg-6 offset-lg-3">
        <form method="post" id="contact">
          <div class="row">

            <div class="col-lg-12">
              <fieldset>
                <input
                  type="text"
                  name="name"
                  class="form-control"
                  placeholder="Your Name"
                  required>
              </fieldset>
            </div>

            <div class="col-lg-12">
              <fieldset>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Your Email"
                  required>
              </fieldset>
            </div>

            <div class="col-lg-12">
              <fieldset>
                <textarea
                  name="message"
                  rows="6"
                  class="form-control"
                  placeholder="Your Message"
                  required></textarea>
              </fieldset>
            </div>

            <div class="col-lg-12">
              <fieldset>
                <button type="submit" class="orange-button">
                  Send Message
                </button>
              </fieldset>
            </div>

          </div>
        </form>
      </div>

    </div>
  </div>
</section>

{% endblock %}
