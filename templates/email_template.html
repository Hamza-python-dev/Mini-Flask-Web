<html>
  <body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">

    <!-- Outer wrapper -->
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1);">

      <!-- Header -->
      <tr>
        <td style="background-color: #ff6600; color: white; text-align: center; padding: 20px;">
          <h1 style="margin: 0;">PROFESSIONAL SKILLS AND TECH </h1>
        </td>
      </tr>

      <!-- Body -->
      <tr>
        <td style="padding: 20px;">
          <h2>New Contact Form Submission</h2>
          <p><strong>Name:</strong> {{ name }}</p>
          <p><strong>Email:</strong> {{ email }}</p>
          <p><strong>Message:</strong></p>
          <p style="padding: 10px; background-color: #f9f9f9; border-left: 4px solid #ff6600;">{{ message }}</p>
        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="background-color: #f4f4f4; color: #888888; text-align: center; padding: 15px; font-size: 12px;">
          This email was sent from your website contact form.
        </td>
      </tr>

    </table>

  </body>
</html>
